<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VARK Learning Styles Assessment</title>

  <style>
    :root {
      --primary: #005eb8;
      --primary-dark: #003f7d;
      --accent: #e8f2ff;
      --text: #1f2933;
      --muted: #5f6c7b;
      --border: #d9e2ec;
      --background: #f7f9fc;
      --white: #ffffff;
      --success: #007a5a;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--white);
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.10);
    }

    .logo-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .programme-label {
